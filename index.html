<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Defend My Human</title>
  <style>
    :root {
      --sky-top: #8fd3ff;
      --sky-bottom: #f7fbff;
      --panel: rgba(255, 255, 255, 0.84);
      --ink: #173042;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.85), transparent 45%),
        linear-gradient(180deg, #79c5f7 0%, #c7efff 50%, #f8ffef 100%);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
    }

    .wrap {
      width: min(96vw, 1000px);
      padding: 18px;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border: 4px solid rgba(23, 48, 66, 0.12);
      border-radius: 18px;
      background: linear-gradient(180deg, var(--sky-top), var(--sky-bottom));
      box-shadow:
        0 16px 40px rgba(23, 48, 66, 0.15),
        inset 0 0 0 2px rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="game" width="960" height="540"></canvas>
  </div>

  <script src="script.js"></script>
</body>
</html>
