<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Defend My Human</title>
  <style>
    :root {
      --sky-top: #8fd3ff;
      --sky-bottom: #f7fbff;
      --panel: rgba(255, 255, 255, 0.84);
      --ink: #173042;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: start center;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.85), transparent 45%),
        linear-gradient(180deg, #79c5f7 0%, #c7efff 50%, #f8ffef 100%);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
    }

    .wrap {
      width: min(96vw, 1000px);
      padding: 18px 18px 12px;
    }

    .mobile-controls {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: start;
      touch-action: none;
      user-select: none;
    }

    .control-actions,
    .control-menu,
    .control-row,
    .cat-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .control-actions {
      justify-content: flex-end;
    }

    .control-menu {
      justify-content: flex-start;
    }

    .control-row {
      grid-column: 1 / span 2;
      display: grid;
      grid-template-columns: repeat(3, 58px);
      grid-template-rows: repeat(2, 52px);
      justify-content: center;
    }

    .cat-controls {
      display: none;
      justify-content: center;
    }

    .cat-controls.is-visible {
      display: grid;
      grid-template-columns: repeat(3, 58px);
      grid-template-rows: repeat(2, 52px);
      justify-content: center;
    }

    .mobile-btn {
      border: 0;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--ink);
      font: 700 18px/1 "Trebuchet MS", "Segoe UI", sans-serif;
      min-width: 58px;
      min-height: 52px;
      box-shadow: 0 8px 18px rgba(23, 48, 66, 0.12);
      touch-action: manipulation;
    }

    .mobile-btn:active,
    .mobile-btn.is-active {
      background: #ffdfae;
      transform: translateY(1px);
    }

    .mobile-btn.wide {
      min-width: 110px;
    }

    .mobile-btn.icon-btn {
      min-width: 78px;
      padding: 0;
      font-size: 22px;
    }

    .mobile-btn.tall {
      min-height: 112px;
    }

    .mobile-btn.escape-btn {
      min-width: 58px;
    }

    .blank {
      visibility: hidden;
    }

    @media (max-width: 720px) {
      body {
        place-items: start stretch;
      }

      .wrap {
        width: 100vw;
        padding: 0;
      }

      .mobile-controls {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 8px 8px 10px;
      }

      .control-actions,
      .control-menu,
      .control-row,
      .cat-controls {
        justify-content: center;
      }

      .mobile-btn {
        min-width: 54px;
        min-height: 46px;
        font-size: 16px;
      }

      .mobile-btn.wide {
        min-width: 96px;
      }

      .mobile-btn.tall {
        min-height: 96px;
      }

      .mobile-btn.icon-btn {
        min-width: 68px;
        font-size: 20px;
      }

      .mobile-btn.escape-btn {
        min-width: 54px;
      }
    }

    @media (orientation: landscape) {
      body {
        place-items: start stretch;
      }

      .wrap {
        width: 100vw;
        padding: 0;
        display: grid;
        grid-template-columns: 67vw 33vw;
        align-items: start;
      }

      canvas {
        width: min(67vw, 586px);
        height: auto;
        max-height: calc(100vh - 12px);
        border-radius: 0 0 16px 16px;
        justify-self: center;
      }

      .mobile-controls {
        margin-top: 0;
        padding: 8px 8px 10px 6px;
        width: 33vw;
        min-height: min-content;
        grid-template-columns: 1fr 1fr;
        justify-content: stretch;
        align-content: start;
        gap: 10px;
      }

      .control-actions,
      .control-menu {
        justify-content: center;
      }

      .control-row {
        grid-column: 1 / span 2;
        grid-template-columns: repeat(3, 50px);
        grid-template-rows: repeat(2, 42px);
      }

      .cat-controls.is-visible {
        grid-template-columns: repeat(3, 50px);
        grid-template-rows: repeat(2, 42px);
      }

      .mobile-btn {
        min-width: 50px;
        min-height: 42px;
        font-size: 15px;
      }

      .mobile-btn.wide {
        min-width: 98px;
      }

      .mobile-btn.tall {
        min-height: 84px;
      }

      .mobile-btn.icon-btn {
        min-width: 72px;
        font-size: 18px;
      }

      .mobile-btn.escape-btn {
        min-width: 50px;
      }

      body.two-player-mode .wrap {
        grid-template-columns: 25vw 50vw 25vw;
      }

      body.two-player-mode canvas {
        width: 50vw;
      }

      body.two-player-mode .cat-controls.is-visible {
        display: grid;
        width: 25vw;
        min-height: min-content;
        align-content: start;
        justify-content: center;
        padding: 2px 0 0;
        margin: 0;
      }

      body.two-player-mode .mobile-controls {
        width: 25vw;
      }
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border: 4px solid rgba(23, 48, 66, 0.12);
      border-radius: 18px;
      background: linear-gradient(180deg, var(--sky-top), var(--sky-bottom));
      box-shadow:
        0 16px 40px rgba(23, 48, 66, 0.15),
        inset 0 0 0 2px rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="cat-controls" aria-label="Cat controls">
      <button class="mobile-btn blank" type="button" tabindex="-1">.</button>
      <button class="mobile-btn" type="button" data-key="w">Up</button>
      <button class="mobile-btn blank" type="button" tabindex="-1">.</button>
      <button class="mobile-btn" type="button" data-key="a">Left</button>
      <button class="mobile-btn" type="button" data-key="s">Down</button>
      <button class="mobile-btn" type="button" data-key="d">Right</button>
    </div>
    <canvas id="game" width="960" height="540"></canvas>
    <div class="mobile-controls" aria-label="Mobile controls">
      <div class="control-menu">
        <button class="mobile-btn escape-btn" type="button" data-key="Escape">Esc</button>
      </div>
      <div class="control-actions">
        <button class="mobile-btn wide" type="button" data-key="Enter">Enter</button>
        <button class="mobile-btn icon-btn" type="button" id="fullscreen-btn" aria-label="Toggle fullscreen" title="Fullscreen">⛶</button>
      </div>
      <div class="control-row">
        <button class="mobile-btn blank" type="button" tabindex="-1">.</button>
        <button class="mobile-btn" type="button" data-key="ArrowUp">Up</button>
        <button class="mobile-btn blank" type="button" tabindex="-1">.</button>
        <button class="mobile-btn" type="button" data-key="ArrowLeft">Left</button>
        <button class="mobile-btn" type="button" data-key="ArrowDown">Down</button>
        <button class="mobile-btn" type="button" data-key="ArrowRight">Right</button>
      </div>
    </div>
  </div>

  <script src="defend-my-human.js"></script>
</body>
</html>
